<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#fbbf24" opacity="0.05" />
  <circle cx="1100" cy="530" r="120" fill="#d97706" opacity="0.05" />
  
  <!-- Logo background -->
  <rect x="460" y="180" width="280" height="280" rx="60" fill="url(#gold)" opacity="0.9" />
  
  <!-- Cross icon (simplified) -->
  <rect x="580" y="220" width="40" height="200" rx="4" fill="white" />
  <rect x="500" y="300" width="200" height="40" rx="4" fill="white" />
  
  <!-- App Name in Bengali -->
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#fbbf24" text-anchor="middle">পবিত্র বানী</text>
  
  <!-- Subtitle -->
  <text x="600" y="570" font-family="Arial, sans-serif" font-size="28" fill="#fbbf24" opacity="0.7" text-anchor="middle">Sacred Word - AI-Powered Bible Study</text>
</svg>
