
<!DOCTYPE html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>পবিত্র বানী - Sacred Word </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Noto+Sans+Bengali:wght@300;400;500;600;700&family=Noto+Serif+Bengali:wght@400;700&display=swap" rel="stylesheet">
    <style>
      @font-face {
        font-family: 'SolaimanLipi';
        src: url('https://cdn.jsdelivr.net/gh/at-shuvo/SolaimanLipi/SolaimanLipi_29-02-20.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: 'Nikosh';
        src: url('https://cdn.jsdelivr.net/gh/brahmadatta/NikoshFont@main/Nikosh.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: 'Mukti';
        src: url('https://cdn.jsdelivr.net/gh/ghatage/mukti-font@main/fonts/Mukti.woff2') format('woff2');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: 'Ananda';
        src: url('https://cdn.jsdelivr.net/gh/sunzongming/Ananda@master/ananda_bold.woff') format('woff');
        font-weight: bold;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: 'Kalpurush';
        src: url('https://cdn.jsdelivr.net/gh/a兆娛/a兆娛.github.io@master/fonts/kalpurush.woff2') format('woff2');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: 'SiyamRupali';
        src: url('https://cdn.jsdelivr.net/gh/nuhil/bangla-fonts@master/SiyamRupali.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: 'AdorshoLipi';
        src: url('https://cdn.jsdelivr.net/gh/nuhil/bangla-fonts@master/AdorshoLipi.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      :root {
        --bg-color: #0f172a;
        --text-color: #f8fafc;
        --card-bg: rgba(30, 41, 59, 0.5);
        --glass-bg: rgba(255, 255, 255, 0.03);
        --border-color: rgba(255, 255, 255, 0.06);
        --accent-gold: #fbbf24;
        --app-font: 'Noto Sans Bengali', 'Hind Siliguri', 'SolaimanLipi', 'Nikosh', system-ui, -apple-system, sans-serif;
      }

      .light-theme {
        --bg-color: #f8fafc;
        --text-color: #0f172a;
        --card-bg: rgba(255, 255, 255, 0.8);
        --glass-bg: rgba(0, 0, 0, 0.03);
        --border-color: rgba(0, 0, 0, 0.08);
        --accent-gold: #d97706;
      }

      html {
        scroll-behavior: smooth;
        height: 100%;
        font-family: var(--app-font);
      }

      body {
        font-family: inherit;
        background-color: var(--bg-color);
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 0;
        height: 100%;
        overflow-y: scroll !important;
        overflow-x: hidden;
        -ms-overflow-style: none !important;
        scrollbar-width: none !important;
        -webkit-overflow-scrolling: touch;
        transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1), 
                    color 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }

      body::-webkit-scrollbar {
        width: 0px !important;
        background: transparent !important;
        display: none !important;
      }

      body * {
        -ms-overflow-style: none !important;
        scrollbar-width: none !important;
      }

      body *::-webkit-scrollbar {
        width: 0px !important;
        background: transparent !important;
        display: none !important;
      }

      ::-webkit-scrollbar {
        width: 0px !important;
        background: transparent !important;
        display: none !important;
      }

      ::-webkit-scrollbar-thumb {
        width: 0px !important;
        background: transparent !important;
        display: none !important;
      }

      /* Base typography overrides */
      h1, h2, h3, h4, p, span, button, input, select {
        font-family: inherit;
        /* Smooth color transition for all elements */
        transition: color 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                    background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                    border-color 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                    box-shadow 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .bn-serif {
        font-family: inherit;
        font-weight: 500;
      }

      .text-divine-gold {
        background: linear-gradient(to right, #fbbf24, #d97706);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .divine-glass {
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border-color);
        transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                    border-color 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                    backdrop-filter 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .divine-card {
        background: var(--card-bg);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        border: 1px solid var(--border-color);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
        transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                    border-color 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                    box-shadow 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      .animate-float {
        animation: float 4s ease-in-out infinite;
      }

      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.4",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react-dom": "https://esm.sh/react-dom@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react-dom/client": "https://esm.sh/react-dom@^19.2.4/client"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
