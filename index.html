      :root {
        --bg-color: #0f172a;
        --text-color: #f8fafc;
        --card-bg: rgba(30, 41, 59, 0.5);
        --glass-bg: rgba(255, 255, 255, 0.03);
        --border-color: rgba(255, 255, 255, 0.06);
        --accent-gold: #fbbf24;
        --app-font: 'Noto Sans Bengali', 'Hind Siliguri', 'SolaimanLipi', 'Nikosh', system-ui, -apple-system, sans-serif;
      }

      .light-theme {
        --bg-color: #f8fafc;
        --text-color: #0f172a;
        --card-bg: rgba(255, 255, 255, 0.8);
        --glass-bg: rgba(0, 0, 0, 0.03);
        --border-color: rgba(0, 0, 0, 0.08);
        --accent-gold: #d97706;
      }

      html {
        scroll-behavior: smooth;
        height: 100%;
        font-family: var(--app-font);
      }

      body {
        font-family: inherit;
        background-color: var(--bg-color);
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 0;
        height: 100%;
        overflow-y: scroll !important;
        overflow-x: hidden;
        -ms-overflow-style: none !important;
        scrollbar-width: none !important;
        -webkit-overflow-scrolling: touch;
        transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1), 
                    color 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }

      body::-webkit-scrollbar {
        width: 0px !important;
        background: transparent !important;
        display: none !important;
      }

      body * {
        -ms-overflow-style: none !important;
        scrollbar-width: none !important;
      }

      body *::-webkit-scrollbar {
        width: 0px !important;
        background: transparent !important;
        display: none !important;
      }

      ::-webkit-scrollbar {
        width: 0px !important;
        background: transparent !important;
        display: none !important;
      }

      ::-webkit-scrollbar-thumb {
        width: 0px !important;
        background: transparent !important;
        display: none !important;
      }

      /* Base typography overrides */
      h1, h2, h3, h4, p, span, button, input, select {
        font-family: inherit;
        transition: color 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                    background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                    border-color 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                    box-shadow 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .bn-serif {
        font-family: inherit;
        font-weight: 400;
      }

      .text-divine-gold {
        background: linear-gradient(to right, #fbbf24, #d97706);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .divine-glass {
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border-color);
        transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                    border-color 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                    backdrop-filter 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .divine-card {
        background: var(--card-bg);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        border: 1px solid var(--border-color);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
        transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                    border-color 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                    box-shadow 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      .animate-float {
        animation: float 4s ease-in-out infinite;
      }

      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      
      /* Loading screen */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #0a0a0a;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      
      #loading-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      
      .loading-content {
        text-align: center;
      }
      
      .loading-spinner {
        width: 48px;
        height: 48px;
        border: 3px solid rgba(217, 119, 6, 0.2);
        border-top-color: #d97706;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 16px;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

    <script>
      // Detect in-app browsers on Android and redirect to external browser
      function isInAppBrowser() {
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        // Check for Android in-app browsers
        if (/android/i.test(userAgent)) {
          // Common in-app browser indicators
          return /FBAN|FBAV|Instagram|WhatsApp|Twitter|LinkedIn|Snapchat|Pinterest|TikTok|wv|WebView/i.test(userAgent) ||
                 (window.navigator.standalone === false && /Safari/i.test(userAgent));
        }
        return false;
      }

      if (isInAppBrowser()) {
        // Redirect to external browser
        window.location.href = 'googlechrome://navigate?url=' + encodeURIComponent(window.location.href);
        // Fallback for other browsers
        setTimeout(function() {
          if (document.hasFocus()) {
            // If still in in-app browser after 1 second, try intent URL
            window.location.href = 'intent://' + window.location.host + window.location.pathname + window.location.search + '#Intent;scheme=https;package=com.android.chrome;end';
          }
        }, 1000);
      }
    </script>
